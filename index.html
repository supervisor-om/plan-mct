<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام خطة سير المشرفين</title>

    <!-- preconnect: فتح الاتصال مبكراً بالخوادم الخارجية قبل تحميل الملفات -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preconnect" href="https://www.gstatic.com">

    <!-- خط Tajawal عبر link بدلاً من @import داخل CSS (أسرع بشكل ملحوظ) -->

    <!-- Import Map: تعريف مصادر المكتبات -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; }
        
        /* أنماط الطباعة */
        @media print {
            @page { size: A4; margin: 10mm; }
            body, html, #root { width: 100%; margin: 0; padding: 0; background-color: white !important; }
            body * { visibility: hidden; }
            .printable-content, .printable-content * { visibility: visible; }
            .printable-content { position: absolute; left: 0; top: 0; width: 100%; direction: rtl; }

</head>
<body>
    <div id="root"></div>

    <!-- كود التطبيق -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, Component } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAnalytics } from 'firebase/analytics';
        import { 
            getAuth, 
            signInAnonymously, 
            onAuthStateChanged, 
            signInWithCustomToken
        } from 'firebase/auth';
        import { 
            getFirestore,
            initializeFirestore, 
            collection, 
            doc, 
            setDoc, 
            onSnapshot, 
            query, 
            serverTimestamp,
            updateDoc,
            deleteField,
            getDoc
        } from 'firebase/firestore';
        import {
            Calendar, FileSpreadsheet, User, Lock, Unlock, Save, LogOut, CheckCircle,
            Users, ChevronRight, ChevronLeft, Search, AlertCircle, AlertTriangle,
            CalendarDays, Trash2, Plus, Edit, X, RefreshCw, Copyright, FileDown,
            History, Download, KeyRound, Settings, Cloud, CalendarCheck, FileText
        } from 'lucide-react';

        // -----------------------------------------------------------
        // ⚠️ إعدادات فايربيس
        // -----------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyAUknGaMIWzeYLWlp-EUZtFzshNaewjwDc",
            authDomain: "supervisor-plan.firebaseapp.com",
            projectId: "supervisor-plan",
            storageBucket: "supervisor-plan.firebasestorage.app",
            messagingSenderId: "584751936902",
            appId: "1:584751936902:web:ab89e36c7f173e9a1c2807",
            measurementId: "G-9YSYCNSNCD"
        };
        // -----------------------------------------------------------

        let app, auth, db, analytics;
        let firebaseError = null;

        try {
            if (typeof __firebase_config !== 'undefined') {
                const config = JSON.parse(__firebase_config);
                app = initializeApp(config);
                auth = getAuth(app);
                db = initializeFirestore(app, { experimentalForceLongPolling: true });
            } 
            else if (firebaseConfig.apiKey) {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = initializeFirestore(app, { experimentalForceLongPolling: true });
                analytics = getAnalytics(app); 
            } 
            else {
                firebaseError = "إعدادات Firebase مفقودة.";
            }
        } catch (e) {
            console.error("Firebase Init Error:", e);
            firebaseError = "خطأ في تهيئة قاعدة البيانات: " + e.message;
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'supervisor-plan-v1';

        // تحميل html2pdf عند الطلب فقط (lazy) لتقليل حجم التحميل الأولي
        const loadHtml2Pdf = () => new Promise((resolve, reject) => {
            if (window.html2pdf) { resolve(); return; }
            const s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
        });

        // --- الثوابت ---
        const COLLECTIONS = { PLANS: 'supervisor_plans', CONFIG: 'app_config' };
        
        // القائمة الافتراضية
        const INITIAL_SUPERVISORS = [
            { id: '1', name: 'صباح المقبالي', password: '1234' },
            { id: '2', name: 'ماجد الأخزمي', password: '1234' },
            { id: '3', name: 'ناصر الرزيقي', password: '1234' },
            { id: '4', name: 'هشام العدواني', password: '1234' },
            { id: '5', name: 'ناصر الناعبي', password: '1234' },
            { id: '6', name: 'أسعد الخصيبي', password: '1234' },
            { id: '7', name: 'هند الهنائية', password: '1234' },
            { id: '8', name: 'يسرى الذخرية', password: '1234' },
            { id: '9', name: 'رؤى المحاربية', password: '1234' },
            { id: '10', name: 'أمل النعمانية', password: '1234' },
            { id: '11', name: 'رياء الشريقية', password: '1234' },
            { id: '12', name: 'عائشة البلوشية', password: '1234' },
            { id: '13', name: 'مهرة اليعقوبية', password: '1234' },
            { id: '14', name: 'رقية العميرية', password: '1234' },
            { id: '15', name: 'آسية الكندية', password: '1234' }
        ];

        // --- مكونات النظام ---
        function CloudStatus() {
            return (
                <div className="flex items-center gap-1 text-[10px] text-emerald-100 bg-emerald-700/30 px-2 py-1 rounded-full">
                    <Cloud size={12} />
                    <span>متصل سحابياً</span>
                </div>
            );
        }

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError() { return { hasError: true }; }
            render() {
                if (this.state.hasError) return <div className="flex h-screen items-center justify-center text-red-600 font-bold">حدث خطأ غير متوقع. يرجى تحديث الصفحة.</div>;
                return this.props.children;
            }
        }

        const getDaysInMonth = (year, month) => {
            const date = new Date(year, month, 1);
            const days = [];
            while (date.getMonth() === month) { days.push(new Date(date)); date.setDate(date.getDate() + 1); }
            return days;
        };
        const getWorkingDaysInMonth = (year, month) => getDaysInMonth(year, month).filter(d => d.getDay() !== 5 && d.getDay() !== 6);
        const getMandatoryKey = (y, m, d) => `${y}_${m}_${d}`;

        function PrintHeader({ supervisorData, month, year }) {
            return (
                <div className="hidden only-print mb-8 font-serif text-black w-full">
                <div className="flex justify-between items-start border-b-2 border-black pb-4 mb-6">
                    <div className="text-center w-1/3"><p>سلطنة عمان</p><p>وزارة التربية والتعليم</p></div>
                    <div className="text-center w-1/3"><h1 className="text-xl font-bold border-2 border-black px-4 py-2 rounded">خطة سير المشرف</h1></div>
                    <div className="text-center w-1/3"><div className="border border-black p-2 text-sm">{year}/{year+1}</div></div>
                </div>
                <div className="flex justify-between border border-black p-2 mb-4">
                    <div>الاسم: {supervisorData.name}</div><div>الشهر: {month+1}</div>
                </div>
                </div>
            );
        }
        function PrintSignatureSection() { return <div className="hidden only-print mt-10 pt-10 border-t border-black flex justify-between"><div>المشرف</div><div>المسؤول</div><div>المدير</div></div>; }
        function AppFooter({ lightMode = false }) { return (<div className={`text-center py-6 mt-4 text-xs no-print ${lightMode ? 'text-emerald-100 opacity-90' : 'text-gray-400'}`}><div className="flex items-center justify-center gap-1 mb-1 font-bold"><span>إعداد وتصميم: أ. أسعد الخصيبي</span></div><p>مشرف الرياضة المدرسية</p></div>); }

        function ChangePasswordModal({ isOpen, onClose, onSave, title }) {
            const [currentPass, setCurrentPass] = useState('');
            const [newPass, setNewPass] = useState('');
            const [confirmPass, setConfirmPass] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            if (!isOpen) return null;
            const handleSubmit = async () => {
                setError('');
                if (!currentPass || !newPass || !confirmPass) return setError('جميع الحقول مطلوبة');
                if (newPass !== confirmPass) return setError('كلمة المرور الجديدة غير متطابقة');
                if (newPass.length < 4) return setError('كلمة المرور يجب أن تكون 4 أحرف على الأقل');
                setLoading(true);
                try { await onSave(currentPass, newPass); onClose(); alert('تم تغيير كلمة المرور بنجاح'); } catch (e) { setError(e.message || 'حدث خطأ'); } finally { setLoading(false); }
            };
            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in"><div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden"><div className="bg-gray-800 text-white p-4 flex justify-between items-center"><h3 className="font-bold flex items-center gap-2"><KeyRound size={20}/> {title || 'تغيير كلمة المرور'}</h3><button onClick={onClose}><X size={20}/></button></div><div className="p-6 space-y-4">{error && <div className="bg-red-50 text-red-600 p-3 rounded text-sm text-center">{error}</div>}<div><label className="block text-sm font-medium text-gray-700 mb-1">كلمة المرور الحالية</label><input type="password" value={currentPass} onChange={e=>setCurrentPass(e.target.value)} className="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" /></div><div><label className="block text-sm font-medium text-gray-700 mb-1">كلمة المرور الجديدة</label><input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} className="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" /></div><div><label className="block text-sm font-medium text-gray-700 mb-1">تأكيد كلمة المرور الجديدة</label><input type="password" value={confirmPass} onChange={e=>setConfirmPass(e.target.value)} className="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" /></div><div className="flex justify-end gap-3 mt-6"><button onClick={onClose} className="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded-lg">إلغاء</button><button onClick={handleSubmit} disabled={loading} className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 disabled:opacity-50">{loading ? '...' : 'حفظ'}</button></div></div></div></div>
            );
        }

        function LoginScreen({ onLogin, user }) { 
            const [name, setName] = useState('');
            const [jobId, setJobId] = useState('');
            const [password, setPassword] = useState('');
            const [adminCode, setAdminCode] = useState('');
            const [mode, setMode] = useState('supervisor'); 
            const [msg, setMsg] = useState('');
            const [supervisorsList, setSupervisorsList] = useState([]);
            const [isLoadingData, setIsLoadingData] = useState(true);

            useEffect(() => {
                if (!db || !user) return;
                const checkAndInitData = async () => {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTIONS.CONFIG, 'supervisors');
                        const docSnap = await getDoc(docRef);
                        if (!docSnap.exists()) await setDoc(docRef, { list: INITIAL_SUPERVISORS });
                    } catch (e) { console.error(e); }
                };
                checkAndInitData();
                const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', COLLECTIONS.CONFIG, 'supervisors'), (doc) => {
                    if (doc.exists() && doc.data().list) setSupervisorsList(doc.data().list);
                    else setSupervisorsList(INITIAL_SUPERVISORS);
                    setIsLoadingData(false);
                });
                return () => unsub();
            }, [user]);

            const handleSupervisorChange = (e) => {
                const selectedName = e.target.value;
                setName(selectedName);
                const supervisor = supervisorsList.find(s => s.name === selectedName);
                if (supervisor) setJobId(supervisor.id); else setJobId('');
            };

            const handleSupervisorLogin = () => {
                if (!name || !jobId) return setMsg('⚠️ يرجى اختيار اسم المشرف');
                if (!password) return setMsg('⚠️ يرجى إدخال كلمة المرور');
                const supervisor = supervisorsList.find(s => s.id === jobId);
                if (supervisor && supervisor.password === password) onLogin('supervisor', { name, jobId });
                else setMsg('❌ كلمة المرور غير صحيحة');
            };

            const handleAdminLogin = async () => {
                if (!adminCode) return setMsg('⚠️ أدخل الرمز');
                try {
                    const settingsSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', COLLECTIONS.CONFIG, 'settings'));
                    const realAdminPass = settingsSnap.exists() && settingsSnap.data().adminPassword ? settingsSnap.data().adminPassword : '1234';
                    if (adminCode === realAdminPass) onLogin('admin');
                    else setMsg('⚠️ رمز المسؤول غير صحيح');
                } catch (e) {
                    if (adminCode === '1234') onLogin('admin'); else setMsg('حدث خطأ في الاتصال');
                }
            };

            if (isLoadingData) return <div className="h-screen flex justify-center items-center text-emerald-600 font-bold">جاري تحميل البيانات...</div>;

            return (
                <div className="min-h-screen bg-emerald-600 flex flex-col items-center justify-center p-4" dir="rtl">
                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
                    <div className="text-center mb-6">
                    <div className="bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><Calendar className="w-8 h-8 text-emerald-600" /></div>
                    <h1 className="text-2xl font-bold text-gray-800">خطة سير المشرفين</h1>
                    </div>
                    <div className="flex bg-gray-100 p-1 rounded-lg mb-6">
                    <button className={`flex-1 py-2 rounded-md text-sm font-medium transition-all ${mode==='supervisor'?'bg-white shadow text-emerald-600':'text-gray-500'}`} onClick={() => {setMode('supervisor'); setMsg('')}}>دخول مشرف</button>
                    <button className={`flex-1 py-2 rounded-md text-sm font-medium transition-all ${mode==='admin'?'bg-white shadow text-emerald-600':'text-gray-500'}`} onClick={() => {setMode('admin'); setMsg('')}}>دخول مسؤول</button>
                    </div>
                    {msg && <div className="mb-4 text-center text-sm text-red-500 bg-red-50 p-2 rounded animate-pulse">{msg}</div>}
                    
                    {mode === 'supervisor' ? (
                    <div className="space-y-4">
                        <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">اسم المشرف *</label>
                        <select value={name} onChange={handleSupervisorChange} className="w-full px-4 py-2 border rounded-lg bg-white focus:ring-2 focus:ring-emerald-500 outline-none">
                            <option value="">-- اختر الاسم --</option>
                            {supervisorsList.map(s => <option key={s.id} value={s.name}>{s.name}</option>)}
                        </select>
                        </div>
                        <div className="flex gap-2">
                            <div className="w-1/3">
                                <label className="block text-sm font-medium text-gray-700 mb-1">الرقم</label>
                                <input type="text" value={jobId} readOnly className="w-full px-4 py-2 border rounded-lg bg-gray-100 text-gray-500 text-center" />
                            </div>
                            <div className="w-2/3">
                                <label className="block text-sm font-medium text-gray-700 mb-1">كلمة المرور *</label>
                                <div className="relative">
                                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="****" />
                                    <KeyRound className="absolute left-3 top-2.5 text-gray-400 w-4 h-4" />
                                </div>
                            </div>
                        </div>
                        <button onClick={handleSupervisorLogin} className="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg hover:bg-emerald-700 transition shadow-lg">دخول</button>
                    </div>
                    ) : (
                    <div className="space-y-4">
                        <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">رمز المسؤول</label>
                        <input type="password" value={adminCode} onChange={e=>setAdminCode(e.target.value)} className="w-full px-4 py-2 border rounded-lg" placeholder="أدخل الرمز" />
                        </div>
                        <button onClick={handleAdminLogin} className="w-full bg-gray-800 text-white font-bold py-3 rounded-lg shadow-lg">دخول</button>
                    </div>
                    )}
                </div>
                <AppFooter lightMode={true} />
                </div>
            );
        }

        function SupervisorDashboard({ user, supervisorData, onLogout }) {
            const [settings, setSettings] = useState({ isOpen: false });
            const [mandatoryEvents, setMandatoryEvents] = useState({});
            const [currentMonth, setCurrentMonth] = useState(new Date().getMonth());
            const [currentYear, setCurrentYear] = useState(new Date().getFullYear());
            const [planData, setPlanData] = useState({});
            const [prevMonthData, setPrevMonthData] = useState({});
            const [isSaving, setIsSaving] = useState(false);
            const [statusMsg, setStatusMsg] = useState('');
            const [showPasswordModal, setShowPasswordModal] = useState(false);
            const [isExportingPDF, setIsExportingPDF] = useState(false);

            useEffect(() => {
                if (!db || !user) return;
                
                // الاستماع للإعدادات (بما في ذلك شهر الإدخال النشط)
                const unsub1 = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', COLLECTIONS.CONFIG, 'settings'), s=> {
                    if(s.exists()) {
                        const data = s.data();
                        setSettings(data);
                        // إذا حدد المسؤول شهراً وسنة معينة، انتقل إليها فوراً
                        if (data.targetMonth !== undefined && data.targetYear !== undefined) {
                            setCurrentMonth(data.targetMonth);
                            setCurrentYear(data.targetYear);
                        }
                    }
                });
                
                const unsub2 = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', COLLECTIONS.CONFIG, 'mandatory_events'), s=>s.exists()&&setMandatoryEvents(s.data()));
                return () => { unsub1(); unsub2(); };
            }, [supervisorData.jobId, user]); 

            useEffect(() => {
                if (!user || !db) return;
                const planId = `${supervisorData.jobId}_${currentYear}_${currentMonth}`;
                const prevMonth = currentMonth === 0 ? 11 : currentMonth - 1;
                const prevYear  = currentMonth === 0 ? currentYear - 1 : currentYear;
                const prevPlanId = `${supervisorData.jobId}_${prevYear}_${prevMonth}`;
                const unsub1 = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', COLLECTIONS.PLANS, `plan_${planId}`), s => {
                    setPlanData(s.exists() ? s.data().visits || {} : {});
                });
                const unsub2 = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', COLLECTIONS.PLANS, `plan_${prevPlanId}`), s => {
                    setPrevMonthData(s.exists() ? s.data().visits || {} : {});
                });
                return () => { unsub1(); unsub2(); };
            }, [supervisorData.jobId, currentMonth, currentYear, user]);

            const workingDays = useMemo(() => getWorkingDaysInMonth(currentYear, currentMonth), [currentYear, currentMonth]);

            // خريطة: يوم الأسبوع → قائمة المدارس المزورة في الشهر السابق
            const prevMonthByDayOfWeek = useMemo(() => {
                const prevMonth = currentMonth === 0 ? 11 : currentMonth - 1;
                const prevYear  = currentMonth === 0 ? currentYear - 1 : currentYear;
                const map = {};
                getWorkingDaysInMonth(prevYear, prevMonth).forEach(d => {
                    const task = prevMonthData[`d_${d.getDate()}`];
                    if (task && task.trim()) {
                        const dow = d.getDay();
                        if (!map[dow]) map[dow] = [];
                        map[dow].push(task.trim());
                    }
                });
                return map;
            }, [prevMonthData, currentMonth, currentYear]);

            const handleInputChange = (key, value) => {
                if (!settings.isOpen) return;
                setPlanData(prev => ({ ...prev, [key]: value }));
            };

            const handlePrint = () => {
                const originalTitle = document.title;
                document.title = `خطة_${supervisorData.name}_${currentMonth+1}`;
                window.focus(); setTimeout(() => { window.print(); setTimeout(() => document.title = originalTitle, 1000); }, 100);
            };

            const handleExportPDF = async () => {
                if (isExportingPDF) return;
                setIsExportingPDF(true);
                setStatusMsg('جاري إنشاء PDF...');
                try {
                    const dateStr = new Date(currentYear, currentMonth).toLocaleDateString('ar-EG', { month: 'long', year: 'numeric' });
                    const monthName = new Date(currentYear, currentMonth).toLocaleDateString('ar-EG', { month: 'long' });
                    let rows = '';
                    workingDays.forEach((d, index) => {
                        const dayNum = d.getDate();
                        const dayName = d.toLocaleDateString('ar-EG', { weekday: 'long' });
                        const fullDate = `${dayNum} / ${currentMonth + 1} / ${currentYear}`;
                        const key = 'd_' + dayNum;
                        const mandKey = getMandatoryKey(currentYear, currentMonth, dayNum);
                        const mandEvt = mandatoryEvents[mandKey];

                });

                let table = `
                <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40" dir="rtl">
                <head>
                    <meta charset="UTF-8">
                    <!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>Report</x:Name><x:WorksheetOptions><x:DisplayRightToLeft/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->
                    <style>
                        table { border-collapse: collapse; width: 100%; font-family: Arial, sans-serif; direction: rtl; }
                        td, th { border: 1px solid #000000; text-align: center; vertical-align: middle; padding: 5px; font-size: 11pt; }
                        .header-top { background-color: #92D050; font-weight: bold; font-size: 14pt; height: 40px; }
                        .header-sub { background-color: #FFFF00; font-weight: bold; font-size: 12pt; }
                        .data-row { background-color: #FFFFFF; }
                        .gray-row { background-color: #F2F2F2; }
                    </style>
                </head>
                <body>
                    <table>
                        <tr><td colspan="${workingDaysInM.length + 2}" class="header-top">خطة سير المشرفين - الفترة: ${dateStr}</td></tr>
                        <tr class="header-sub"><td rowspan="2" style="width: 50px;">م</td><td rowspan="2" style="width: 200px;">اسم المشرف</td>${headerDays}</tr>
                        <tr class="header-sub">${headerDates}</tr>
                        ${dataRows}
                    </table>
                </body>
                </html>`;

                const blob = new Blob([table], { type: 'application/vnd.ms-excel;charset=utf-8' }); 
                const url = URL.createObjectURL(blob); 
                const link = document.createElement("a"); 
                link.href = url; 
                link.download = `تقرير_${filterMonth+1}_${currentYear}.xls`; 
                document.body.appendChild(link); 
                link.click(); 
                document.body.removeChild(link);
            };

            const filteredPlans = plans.filter(p => { const s = searchTerm.toLowerCase(); return (p.supervisorName || '').toLowerCase().includes(s) || (p.supervisorId || '').toLowerCase().includes(s); });
            const currentMonthEvents = useMemo(() => Object.entries(mandatoryEvents).map(([k,t]) => { const [y, m, d] = k.split('_').map(Number); const eventDate = new Date(y, m, d); const dayName = eventDate.toLocaleDateString('ar-EG', { weekday: 'long' }); return {y,m,d,t,dayName,key:k}; }).filter(e => e.y === currentYear && e.m === filterMonth).sort((a,b)=>a.d-b.d), [mandatoryEvents, currentYear, filterMonth]);

            return (
                <div className="min-h-screen bg-gray-100 font-sans" dir="rtl">
                {editingPlan && <AdminPlanEditor plan={editingPlan} mandatoryEvents={mandatoryEvents} onClose={() => setEditingPlan(null)} onSave={saveAdminEdit} />}
                <ChangePasswordModal isOpen={showPasswordModal} onClose={() => setShowPasswordModal(false)} onSave={handleChangeAdminPassword} title="تغيير كلمة مرور المسؤول" />
                <div className="bg-gray-900 text-white p-4 flex justify-between">
                    <div className="flex flex-col">
                         <h1 className="font-bold flex gap-2 items-center"><Users/> لوحة الإدارة</h1>
                         <CloudStatus />
                    </div>
                    <div className="flex gap-2"><button onClick={() => setShowPasswordModal(true)} className="flex items-center gap-1 text-gray-300 hover:text-white bg-gray-800 hover:bg-gray-700 px-3 py-1 rounded transition"><KeyRound size={16} /> تغيير الرمز</button><button onClick={onLogout} className="flex items-center gap-2 text-gray-300 hover:text-white px-3 py-1 rounded transition"><span>خروج</span><LogOut size={18} /></button></div>
                </div>
                <div className="max-w-7xl mx-auto p-6 space-y-6">
                    <div className="grid md:grid-cols-4 gap-4">
                    <div className="bg-white p-4 rounded shadow"><h3 className="font-bold text-sm mb-2 flex items-center gap-2"><CalendarCheck size={16} /> إعدادات الشهر (يظهر للمشرفين)</h3><div className="flex gap-2"><select value={filterMonth} onChange={e=>handleMonthYearChange(parseInt(e.target.value), currentYear)} className="w-1/2 border p-2 rounded">{Array.from({length:12},(_,i)=><option key={i} value={i}>شهر {i+1}</option>)}</select><select value={currentYear} onChange={e=>handleMonthYearChange(filterMonth, parseInt(e.target.value))} className="w-1/2 border p-2 rounded">{yearsList.map(y => <option key={y} value={y}>{y}</option>)}</select></div></div>
                    <button onClick={toggleSubmission} className={`p-4 rounded font-bold shadow ${settings.isOpen?'bg-red-50 text-red-600':'bg-emerald-50 text-emerald-600'}`}>{settings.isOpen?'إغلاق التسجيل':'فتح التسجيل'}</button>
                    <div className="md:col-span-2 bg-orange-50 p-4 rounded shadow border border-orange-200">
                        <div className="flex gap-2"><select value={newEventDay} onChange={e=>setNewEventDay(parseInt(e.target.value))} className="p-2 rounded border w-32 text-xs">{daysInSelectedMonth.map(day => (<option key={day.num} value={day.num} className={day.isWeekend ? 'text-red-500' : ''}>{day.num} - {day.name} {day.isWeekend ? '(عطلة)' : ''}</option>))}</select><input value={newEventText} onChange={e=>setNewEventText(e.target.value)} placeholder="حدث إلزامي..." className="flex-1 p-2 rounded border" /><button onClick={handleEventSubmit} className="bg-orange-600 text-white px-4 rounded hover:bg-orange-700">{editingEventKey?'تعديل':'إضافة'}</button>{editingEventKey && <button onClick={()=>{setEditingEventKey(null);setNewEventText('');}} className="bg-gray-300 px-3 rounded">إلغاء</button>}</div>
                        <div className="flex flex-wrap gap-2 mt-2">{currentMonthEvents.map(evt => (<div key={evt.key} className="bg-orange-100 text-orange-800 text-xs px-2 py-1 rounded-full flex gap-1 items-center border border-orange-200"><b>{evt.d} ({evt.dayName}):</b> {evt.t}<button onClick={()=>{setNewEventDay(evt.d);setNewEventText(evt.t);setEditingEventKey(evt.key)}}><Edit size={12}/></button><button onClick={()=>deleteMandatoryEvent(evt.key)}><Trash2 size={12}/></button></div>))}</div>
                    </div>
                    </div>
                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200"><h3 className="text-gray-500 text-sm font-bold mb-3">التقارير المجمعة</h3><button onClick={exportToExcel} className="w-full py-2 rounded-lg font-bold flex items-center justify-center gap-2 bg-blue-50 text-blue-700 border border-blue-200 hover:bg-blue-100"><FileSpreadsheet size={18} /> تصدير تقرير شامل (تنسيق Excel مطابق للصورة)</button></div>
                    <div className="bg-white rounded shadow overflow-hidden">
                    <div className="p-4 border-b border-gray-200 bg-gray-50 flex flex-wrap gap-4 justify-between items-center"><div className="flex items-center gap-2"><CheckCircle className="text-emerald-500" size={20} /><h2 className="font-bold text-gray-700">الخطط المستلمة ({filteredPlans.length})</h2></div><div className="relative w-full md:w-64"><Search className="absolute right-3 top-3 text-gray-400 w-4 h-4" /><input type="text" placeholder="بحث بالاسم..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm" /></div></div>
                    <table className="w-full text-right"><thead className="bg-gray-100 text-sm"><tr><th className="p-4">الاسم</th><th className="p-4">الرقم</th><th className="p-4">إجراءات</th></tr></thead><tbody className="divide-y">{filteredPlans.map((plan, idx) => (<tr key={idx} className="hover:bg-gray-50"><td className="p-4 font-bold">{plan.supervisorName}</td><td className="p-4 text-gray-500">{plan.supervisorId}</td><td className="p-4 flex flex-wrap gap-2"><button onClick={()=>setEditingPlan(plan)} className="bg-blue-50 text-blue-600 px-3 py-1 rounded text-sm hover:bg-blue-100 flex items-center gap-1"><Edit size={16}/> تعديل</button><button onClick={() => downloadSinglePlanPDF(plan)} className="bg-red-50 text-red-600 px-3 py-1 rounded text-sm hover:bg-red-100 flex items-center gap-1" title="تنزيل PDF"><FileText size={16}/> PDF</button><button onClick={() => downloadSinglePlan(plan)} className="bg-green-50 text-green-600 px-3 py-1 rounded text-sm hover:bg-green-100 flex items-center gap-1" title="تنزيل Excel"><Download size={16}/> Excel</button></td></tr>))} {plans.length===0 && <tr><td colSpan="3" className="p-8 text-center text-gray-400">لا توجد خطط</td></tr>}</tbody></table>
                    </div>
                </div>
                <AppFooter />
                </div>
            );
        }

        // --- المكون الرئيسي الذي يدير العرض ---
        function App() {
            const [user, setUser] = useState(null);
            const [role, setRole] = useState(null);
            const [supervisorData, setSupervisorData] = useState({ name: '', jobId: '' });
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(firebaseError);

            useEffect(() => {
                if (error) { setLoading(false); return; }
                if (!auth) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                        else await signInAnonymously(auth);
                    } catch (err) { setError("فشل الاتصال."); setLoading(false); }
                };
                initAuth();
                return onAuthStateChanged(auth, (u) => { if(u) { setUser(u); setLoading(false); } });
            }, [error]);

            const handleLogout = () => { setRole(null); setSupervisorData({name:'', jobId:''}); };

            if (error) return <div className="flex h-screen items-center justify-center text-red-600">{error}</div>;
            if (loading) return <div className="h-screen flex items-center justify-center text-emerald-600 font-bold">جاري التحميل...</div>;

            if (!role) return <LoginScreen onLogin={(r, d) => { setRole(r); if(d) setSupervisorData(d); }} user={user} />;
            if (role === 'admin') return <AdminDashboard user={user} onLogout={handleLogout} />;
            return <SupervisorDashboard user={user} supervisorData={supervisorData} onLogout={handleLogout} />;
        }

        // --- مكون تعديل الخطة (Admin) ---
        function AdminPlanEditor({ plan, mandatoryEvents, onClose, onSave }) {
            const [localVisits, setLocalVisits] = useState(plan.visits || {});
            const [isSaving, setIsSaving] = useState(false);
            const workingDays = useMemo(() => getWorkingDaysInMonth(plan.year, plan.month), [plan.year, plan.month]);
            const handleSave = async () => { setIsSaving(true); await onSave(localVisits); setIsSaving(false); };
            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm"><div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col"><div className="p-4 border-b flex justify-between bg-gray-50 rounded-t-2xl"><h3 className="font-bold">تعديل: {plan.supervisorName}</h3><button onClick={onClose}><X size={20}/></button></div><div className="overflow-y-auto p-4 flex-1 bg-gray-50"><div className="space-y-2">{workingDays.map((date) => { const dayNum = date.getDate(); const dayName = date.toLocaleDateString('ar-EG', { weekday: 'long' }); const key = `d_${dayNum}`; const mandKey = getMandatoryKey(plan.year, plan.month, dayNum); return (<div key={key} className={`flex gap-2 p-2 rounded border items-center ${mandatoryEvents[mandKey] ? 'bg-orange-100' : 'bg-white'}`}><div className="w-24 text-center border-l pl-2 ml-2 border-gray-200"><div className="font-bold text-gray-800 text-sm">{dayName}</div><div className="text-xs text-gray-500">{dayNum} / {plan.month + 1}</div></div>{mandatoryEvents[mandKey] ? (<div className="flex-1 text-orange-800 flex items-center gap-2"><Lock size={14}/> {mandatoryEvents[mandKey]}</div>) : (<input className="flex-1 p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" value={localVisits[key]||''} onChange={e=>setLocalVisits({...localVisits, [key]: e.target.value})} placeholder="أدخل المهمة..." />)}</div>); })}</div></div><div className="p-4 border-t flex justify-end gap-2"><button onClick={onClose} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded transition-colors">إلغاء</button><button onClick={handleSave} disabled={isSaving} className="px-4 py-2 bg-blue-600 text-white rounded shadow hover:bg-blue-700 transition-colors flex items-center gap-2">{isSaving ? 'جاري الحفظ...' : <><Save size={18} /> حفظ التعديلات</>}</button></div></div></div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
